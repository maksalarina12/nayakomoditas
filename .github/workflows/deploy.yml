name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies (Bun)
        run: bun install

      - name: Build static SPA with Bun
        env:
          # Hardcoded to match vite.config.ts. Change here AND in vite.config.ts
          # if you rename the repo (or set to "/" for a <username>.github.io repo).
          VITE_BASE_PATH: /nayakomoditas/
        run: bun run build

      - name: Prepare ./dist for GitHub Pages
        run: |
          # TanStack Start static SPA emits to dist/client. The user requested
          # publish_dir: ./dist, so we flatten dist/client -> dist.
          if [ -d dist/client ]; then
            mkdir -p dist_publish
            cp -r dist/client/. dist_publish/
            rm -rf dist
            mv dist_publish dist
          fi

          # GitHub Pages serves index.html, but TanStack Start emits _shell.html.
          # Copy it as index.html AND 404.html so deep links + refresh work.
          if [ -f dist/_shell.html ]; then
            cp dist/_shell.html dist/index.html
            cp dist/_shell.html dist/404.html
          elif [ -f dist/index.html ]; then
            cp dist/index.html dist/404.html
          fi

          # Disable Jekyll so files starting with "_" (e.g. _shell.html, _assets) are served.
          touch dist/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
