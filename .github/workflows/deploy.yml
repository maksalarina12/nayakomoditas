name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (static SPA)
        env:
          # Auto-derived from repo name: /<repo>/
          # If you rename the repo to <username>.github.io, change this to "/"
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: bun run build

      - name: Add SPA fallback (index.html + 404.html)
        run: |
          # TanStack Start static SPA emits the shell as _shell.html.
          # GitHub Pages needs index.html; copy it (also as 404.html so client routing works).
          if [ -f dist/client/_shell.html ]; then
            cp dist/client/_shell.html dist/client/index.html
            cp dist/client/_shell.html dist/client/404.html
          elif [ -f dist/client/index.html ]; then
            cp dist/client/index.html dist/client/404.html
          fi
          touch dist/client/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/client
          publish_branch: gh-pages
          force_orphan: true
