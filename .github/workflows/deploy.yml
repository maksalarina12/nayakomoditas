name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (static SPA)
        env:
          # IMPORTANT: must match your GitHub repository name, with leading + trailing slash.
          # For a project page at https://<user>.github.io/<repo>/ use "/<repo>/".
          # For a user/organization page (<user>.github.io repo) use "/".
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: bun run build

      - name: Add SPA fallback (index.html + 404.html)
        run: |
          # TanStack Start static SPA emits the shell as _shell.html.
          # GitHub Pages needs index.html; copy it (also as 404.html so client routing works on deep links / refresh).
          if [ -f dist/client/_shell.html ]; then
            cp dist/client/_shell.html dist/client/index.html
            cp dist/client/_shell.html dist/client/404.html
          elif [ -f dist/client/index.html ]; then
            cp dist/client/index.html dist/client/404.html
          fi

      - name: Disable Jekyll
        run: touch dist/client/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
